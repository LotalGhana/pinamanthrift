<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Cart — Pina's Thrift</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="siteNav"></div>

<main class="container">
  <div class="page-title">
    <h1>Your Shopping Cart</h1>
    <p>Review your selections before checkout.</p>
  </div>

  <div class="layout-2col">
    <div class="panel" id="cartItems"></div>

    <div>
      <div class="panel">
        <h3>Order Summary</h3>
        <div id="summary"></div>
        <button class="btn btn-primary mt-2" style="width:100%" onclick="goCheckout()">Proceed to Checkout
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <a href="index.html" class="btn btn-ghost" style="width:100%;margin-top:.4rem">← Continue Shopping</a>
      </div>
    </div>
  </div>
</main>

<div id="siteFooter"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
mountChrome('');
// Load products into cache so stock checks work in updateCartQty
loadProducts();

function renderCart(){
  const items = getCart();
  const wrap = document.getElementById('cartItems');
  if(items.length===0){
    wrap.innerHTML = `<div class="empty"><h3>Your cart is empty</h3><p>Browse our collection and add something lovely!</p><a href="index.html" class="btn btn-primary mt-2">Shop Now</a></div>`;
    document.getElementById('summary').innerHTML = '';
    return;
  }
  wrap.innerHTML = `<h3>Items (${cartCount()})</h3>` + items.map(it => `
    <div class="cart-row">
      <img src="${it.image}" alt="${it.name}"/>
      <div>
        <div style="font-weight:600">${it.name}</div>
        <div class="text-muted" style="font-size:.85rem">${money(it.price)} each</div>
        <div style="margin-top:.5rem" class="row">
          <div class="qty">
            <button onclick="updateCartQty('${it.id}',-1);renderCart()">−</button>
            <span>${it.qty}</span>
            <button onclick="updateCartQty('${it.id}',1);renderCart()">+</button>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="removeFromCart('${it.id}');renderCart()">Remove</button>
        </div>
      </div>
      <div style="text-align:right">
        <div class="price">${money(it.price*it.qty)}</div>
      </div>
    </div>
  `).join('');

  const sub = cartTotal();
  const shipping = sub >= 500 ? 0 : 25;
  const total = sub + shipping;
  document.getElementById('summary').innerHTML = `
    <div class="summary-row"><span>Subtotal</span><span>${money(sub)}</span></div>
    <div class="summary-row"><span>Shipping</span><span>${shipping===0?'FREE':money(shipping)}</span></div>
    ${shipping>0 ? `<div class="text-muted" style="font-size:.78rem;margin-top:-.2rem">Add ${money(500-sub)} for free shipping</div>`:''}
    <div class="summary-row total"><span>Total</span><span class="price">${money(total)}</span></div>
  `;
}

function goCheckout(){
  if(cartCount()===0){ toast('Your cart is empty','error'); return; }
  location.href = 'checkout.html';
}

renderCart();
</script>
</body>
</html>
