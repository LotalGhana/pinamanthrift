<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Track Your Order — Pina's Thrift</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="siteNav"></div>

<main class="container">
  <div class="page-title">
    <h1>Track Your Order</h1>
    <p>Enter your Order ID or the reference name you used at checkout.</p>
  </div>

  <div class="panel" style="max-width:640px">
    <form onsubmit="doSearch(event)">
      <div class="field">
        <label>Order ID or Reference Name</label>
        <input type="text" id="query" required placeholder="e.g. PT-A8X3K-1234 or Ama Serwaa"/>
      </div>
      <button type="submit" class="btn btn-primary">Track Order</button>
    </form>
  </div>

  <div id="result" style="margin-top:1.5rem"></div>
</main>

<div id="siteFooter"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
mountChrome('track');

const params = new URLSearchParams(location.search);
const initial = params.get('q');
if(initial){ document.getElementById('query').value = initial; setTimeout(()=>doSearch(), 100); }

async function doSearch(e){
  if(e) e.preventDefault();
  const q = document.getElementById('query').value.trim();
  const result = document.getElementById('result');
  result.innerHTML = `<div class="empty">Searching…</div>`;
  const order = await findOrder(q);
  if(!order){
    result.innerHTML = `<div class="empty"><h3>No order found</h3><p>Please double-check the Order ID or reference name and try again.</p></div>`;
    return;
  }
  renderOrder(order);
}

function renderOrder(o){
  const stages = ORDER_STAGES;
  const currentIdx = stages.indexOf(o.status);
  result.innerHTML = `
    <div class="layout-2col">
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:1rem">
          <div>
            <div class="text-muted" style="font-size:.78rem;text-transform:uppercase;letter-spacing:.05em">Order</div>
            <div class="serif" style="font-size:1.5rem;color:var(--rose-700);font-weight:700">${o.id}</div>
            <div style="margin-top:.3rem" class="text-muted">Placed ${formatDate(o.createdAt)}</div>
          </div>
          <span class="status-pill status-${o.status.toLowerCase().replace(/ .*/,'')}">${o.status}</span>
        </div>

        <h3 style="margin-top:1.5rem">Progress</h3>
        <div class="timeline">
          ${stages.map((s,i)=>{
            const cls = i < currentIdx ? 'done' : i === currentIdx ? 'done current' : '';
            const hist = o.history.find(h => h.status === s);
            return `
              <div class="tl-step ${cls}">
                <div class="tl-dot">${i < currentIdx ? '✓' : i+1}</div>
                <div class="tl-body">
                  <h4>${s}</h4>
                  <p>${hist ? formatDate(hist.at) : (i===currentIdx ? 'In progress…' : 'Awaiting')}</p>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <div>
        <div class="panel">
          <h3>Customer</h3>
          <p style="margin:.2rem 0"><b>${o.customerName}</b></p>
          <p style="margin:.2rem 0" class="text-muted">📞 ${o.customerMobile||'—'}</p>
          ${o.customerEmail ? `<p style="margin:.2rem 0" class="text-muted">✉ ${o.customerEmail}</p>`:''}
          <p style="margin:.4rem 0;font-size:.85rem"><span class="text-muted">Payment Reference:</span> <b>${o.reference}</b></p>
        </div>
        <div class="panel" style="margin-top:1rem">
          <h3>Items</h3>
          ${o.items.map(it=>`
            <div class="summary-row"><span>${it.name} × ${it.qty}</span><span>${money(it.price*it.qty)}</span></div>
          `).join('')}
          <div class="summary-row total"><span>Total</span><span class="price">${money(o.total)}</span></div>
        </div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
